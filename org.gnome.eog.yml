id: org.gnome.eog
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: eog
rename-appdata-file: org.gnome.eog.metainfo.xml
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # We want full fs access so we can read the files
  - --filesystem=host
  # Migrate old dconf settings
  - --metadata=X-DConf=migrate-path=/org/gnome/eog/
  # GVFS access
  - --talk-name=org.gtk.vfs.*
  - --filesystem=xdg-run/gvfsd
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /lib/girepository-1.0
  - /libexec
  - /man
  - /share/aclocal
  - /share/gir-1.0
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'
modules:
  - name: libportal
    buildsystem: meson
    config-opts:
      - -Dbackend-gtk3=enabled
      - -Dbackend-gtk4=disabled
      - -Dintrospection=false
      - -Ddocs=false
    sources:
      - type: archive
        url: https://github.com/flatpak/libportal/archive/0.9.1.tar.gz
        sha256: ea422b789ae487e04194d387bea031fd7485bf88a18aef8c767f7d1c29496a4e
        x-checker-data:
          type: anitya
          project-id: 230124
          stable-only: true
          url-template: https://github.com/flatpak/libportal/archive/$version.tar.gz

  - name: gnome-desktop
    buildsystem: meson
    config-opts:
      - -Ddesktop_docs=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gnome-desktop/44/gnome-desktop-44.5.tar.xz
        sha256: 20e0995a6e3a03e8c1026c5a27bc3f45e69ffcc392ad743dcab6107a541d232f
        x-checker-data:
          type: gnome
          name: gnome-desktop

  - name: libpeas
    buildsystem: meson
    config-opts:
      - -Dglade_catalog=false
      - -Ddemos=false
    cleanup: [/lib/peas-demo]
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libpeas/1.38/libpeas-1.38.1.tar.xz
        sha256: e82fd328adcac1aba34b64136bdfcbbacf2b3258a8bc4e5f480a72502a611ae9
        x-checker-data:
          type: gnome
          name: libpeas
          versions:
            <: 1.99.0

  - name: exempi
    cleanup: [/bin]
    rm-configure: true
    config-opts:
      - --disable-unittest
      - --disable-static
    sources:
      - type: archive
        url: https://libopenraw.freedesktop.org/download/exempi-2.6.6.tar.bz2
        sha256: 7513b7e42c3bd90a58d77d938c60d2e87c68f81646e7cb8b12d71fe334391c6f
        x-checker-data:
          type: anitya
          project-id: 767
          url-template: https://libopenraw.freedesktop.org/download/exempi-$version.tar.bz2
      - type: script
        commands:
          - autoreconf -vfi

  - name: eog
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/eog/50/eog-50.1.tar.xz
        sha256: 6f5ee6d756548b88e25a987e0d06dabc3c6c32598fb7df49fb08945c1fe94a55
        x-checker-data:
          type: gnome
          name: eog
          is-important: true

  - name: eog-plugins
    buildsystem: meson
    config-opts:
      - -Dplugin_map=false
      - -Dplugin_postasa=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/eog-plugins/44/eog-plugins-44.1.tar.xz
        sha256: c4c384155fabb34889d76b616065483f94c8310fa0147236d009c68cd4a85c93
        x-checker-data:
          type: gnome
          name: eog-plugins
